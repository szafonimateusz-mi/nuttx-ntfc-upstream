      conf_path: ''
      elf_path: ''

    core4:                        # (optional) Aux core 2
      name: ''
      device: ''
      conf_path: ''
      elf_path: ''

    core5:                        # (optional) Aux core 2
      name: ''
      device: ''
      conf_path: ''
      elf_path: ''

